<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; margin: 0; padding: 14px; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; font-size: 13px; }
    h3 { margin: 0 0 10px; font-size: 15px; }
    .status { padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; }
    .status.ok { background: #dafbe1; color: #1a7f37; }
    .status.warn { background: #fff8c5; color: #9a6700; }
    .tip { color: #57606a; margin: 8px 0; line-height: 1.5; }
    code { background: #f6f8fa; padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, monospace; }
    button { width: 100%; padding: 7px; border: 1px solid #d0d7de; background: #fff; border-radius: 6px; cursor: pointer; }
    button:hover { background: #f6f8fa; }
    .sep { height: 1px; background: #d0d7de; margin: 12px 0; }
    label { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    select { padding: 3px 6px; border-radius: 4px; border: 1px solid #d0d7de; }
  </style>
</head>
<body>
  <h3>📄 Markdown Viewer Plus</h3>
  <div id="status" class="status warn">检查文件访问权限…</div>
  <p class="tip">在浏览器里打开本地 <code>.md</code> 文件即可自动渲染。</p>
  <button id="open-ext">打开扩展管理页</button>
  <div class="sep"></div>
  <label>默认主题
    <select id="theme">
      <option value="light">浅色</option>
      <option value="dark">深色</option>
    </select>
  </label>
  <script src="popup.js"></script>
</body>
</html>
